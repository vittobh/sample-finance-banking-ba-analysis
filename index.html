<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Agentic KYC — Bank Teller Tablet</title>
<meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="style.css"></head>
<body><header>
<div><h1>Agentic KYC — Bank Teller Tablet</h1><div class="tagline">Multi-agent KYC crew · Promptfoo gate · regulated-AI guardrails</div></div>
<button id="theme-toggle" class="theme-toggle">☾ Dark</button>
</header><main>
<div id="ai-banner" class="banner" style="display:none"></div>
<div class="row" style="margin-bottom:1rem">
  <span class="dim">Live AI keys:</span>
  <button class="btn btn-ghost" onclick="app.setKey('anthropic')">+ Claude</button>
  <button class="btn btn-ghost" onclick="app.setKey('gemini')">+ Gemini</button>
  <button class="btn btn-ghost" onclick="app.setKey('grok')">+ Grok</button>
</div>
<div class="grid" style="grid-template-columns:2fr 1fr">
  <div class="card"><h3>Customer Registration (Teller)</h3>
    <div class="grid" style="grid-template-columns:1fr 1fr">
      <input class="input" placeholder="Full name" id="n">
      <input class="input" placeholder="DOB" id="dob" type="date">
      <input class="input" placeholder="Address" id="addr">
      <input class="input" placeholder="Postal code" id="pc">
      <input class="input" placeholder="Contact" id="ph">
      <input class="input" placeholder="SSN (masked)" id="ssn" type="password">
      <select class="select" id="acct"><option>Savings</option><option>Current</option><option>Business</option></select>
      <select class="select" id="cit"><option>US</option><option>UK</option><option>India</option><option>Other</option></select>
    </div>
    <h3 style="margin-top:1rem">Photo ID</h3>
    <input type="file" class="input" id="photo" accept="image/*">
    <h3 style="margin-top:1rem">E-signature</h3>
    <canvas id="sig" width="500" height="100" style="border:1px solid var(--border);width:100%;background:var(--surface-2);border-radius:.5rem;cursor:crosshair"></canvas>
    <div class="row" style="margin-top:.25rem"><button class="btn" onclick="clearSig()">Clear</button>
    <label style="margin-left:auto"><input type="checkbox" id="terms"> I accept terms</label></div>
    <button class="btn btn-primary" style="margin-top:1rem;width:100%" onclick="submitKYC()">Submit application</button>
    <div id="result" style="margin-top:1rem"></div>
  </div>
  <div class="card"><h3>🤖 Multi-Agent KYC Crew</h3>
    <div id="agents" class="pipeline" style="flex-direction:column"></div>
    <div id="dec" class="dim" style="margin-top:.5rem;font-size:.85rem"></div>
  </div>
</div>
</main>
<script src="app.js"></script><script src="page.js"></script>
</body></html>
